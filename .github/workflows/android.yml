name: Antonio Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

env:
  # This kills the deprecation warning and opts into the new Node.js 24 engine now
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10.2

      - name: Force-Generate Clean Wrapper
        run: |
          echo "Replacing 44-byte ghost with official 8.10.2 engine..."
          gradle wrapper
          chmod +x gradlew

      - name: Decode Master Keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/antonio-release.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          RELEASE_STORE_FILE: antonio-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-App-Build-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk 
