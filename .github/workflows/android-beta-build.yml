name: Android Beta Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Assemble Beta APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Gradle dependencies and wrapper
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 4. Download Gradle 8.2 automatically
      - name: Download Gradle 8.2 Wrapper
        run: |
          mkdir -p gradle/wrapper/dists
          curl -L -o gradle/wrapper/dists/gradle-8.2-all.zip https://services.gradle.org/distributions/gradle-8.2-all.zip
          unzip -o gradle/wrapper/dists/gradle-8.2-all.zip -d gradle/wrapper/dists/

      # 5. Make Gradlew executable
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      # 6. Assemble Debug APK
      - name: Assemble Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload APK artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MyLotto-Beta-APK
          path: app/build/outputs/apk/debug/app-debug.apk