name: Chrome Ghost Cloud Build
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Changed to 17 for better stability with older Gradle
          distribution: 'temurin'
          cache: 'gradle' 

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Compile Debug APK
        # Added 'clean' to ensure no leftover "nightmare" files interfere
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Chrome-Ghost-Install-File
          # This path covers both the standard and the "unaligned" debug APKs
          path: app/build/outputs/apk/debug/*.apk
