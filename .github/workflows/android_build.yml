name: Antonio Persistent Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. Try to restore the keystore from the GitHub Cache
      - name: Restore Keystore Cache
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: app/antonio-release.jks
          key: ${{ runner.os }}-antonio-keystore-v1

      # 2. Generate key ONLY if cache is empty. Note: Single line prevents "Illegal Option" errors.
      - name: Generate Fresh Keystore (If Cache Miss)
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v -keystore app/antonio-release.jks -alias "${{ secrets.KEY_ALIAS }}" -keyalg RSA -keysize 2048 -validity 10000 -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" -dname "CN=Antonio, OU=Dev, O=MoweApp, L=City, S=State, C=US"

      - name: Grant execute permission
        run: chmod +x gradlew

      # 3. Build the App with the auto-incrementing version
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -PversionCode=${{ github.run_number }} -PversionName="1.0.${{ github.run_number }}"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: "antonio-release.jks"

      # 4. Upload the finished App
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-Build-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk

      # 5. Backup the Key file so you can save it locally
      - name: Backup Keystore File
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-Key-Backup
          path: app/antonio-release.jks

          
          